name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with NLP)
        run: |
          pip install -e ".[dev,nlp]"

      - name: Install spaCy model
        run: |
          python -m spacy download en_core_web_sm

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  test-minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install without spaCy
        run: |
          pip install -e ".[dev]"

      - name: Verify import works without spaCy
        run: |
          python -c "from checker import run_pipeline; print('import OK')"

      - name: Run tests (entity/QA tests will return 0 gracefully)
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ --ignore E501,F841
