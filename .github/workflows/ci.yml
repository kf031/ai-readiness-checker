name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev,nlp]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=long -p no:warnings --junitxml=junit.xml

      - name: Show test outcomes
        if: always()
        run: |
          echo "=== JUNIT RESULTS ==="
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('junit.xml')
          fails = errors = 0
          for tc in tree.findall('.//testcase'):
              fc = tc.findall('failure') + tc.findall('error')
              if fc:
                  msg = fc[0].get('message','')[:200] if fc[0].get('message') else ''
                  print('FAIL:', tc.get('classname',''), tc.get('name',''), msg)
                  fails += 1
          if fails == 0:
              print('All tests passed')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit.xml

  test-no-nlp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package (no spaCy)
        run: pip install -e ".[dev]"

      - name: Run tests (no NLP)
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=long -p no:warnings --junitxml=junit.xml

      - name: Show test outcomes
        if: always()
        run: |
          echo "=== JUNIT RESULTS ==="
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('junit.xml')
          fails = 0
          for tc in tree.findall('.//testcase'):
              fc = tc.findall('failure') + tc.findall('error')
              if fc:
                  msg = fc[0].get('message','')[:200] if fc[0].get('message') else ''
                  print('FAIL:', tc.get('classname',''), tc.get('name',''), msg)
                  fails += 1
          if fails == 0:
              print('All tests passed')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-no-nlp
          path: junit.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
